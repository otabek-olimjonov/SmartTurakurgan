name: smart_turakurgan
description: "Smart Turakurgan - Barcha xizmatlar bitta ilovada"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  supabase_flutter: ^2.5.6
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3+1
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.0
  timeago: ^3.7.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  image_picker: ^1.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.13

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
